<div class="min-h-screen flex items-center justify-center bg-slate-950 px-4 py-10">
  <div
    class="w-full max-w-md bg-slate-900/80 border border-slate-800 rounded-2xl shadow-2xl shadow-slate-950/80 p-8 text-slate-100"
  >
    <h1 class="text-2xl font-semibold mb-2">Create account</h1>
    <p class="text-sm text-slate-400 mb-6">
      Already have an account?
      <a routerLink="/signin" class="text-indigo-400 hover:text-indigo-300 font-medium">Sign in</a>
    </p>

    <form (ngSubmit)="submit()" class="space-y-4">
      <div class="space-y-1">
        <label class="block text-sm text-slate-300">Name</label>
        <input
          type="text"
          name="name"
          [(ngModel)]="form.name"
          required
          autocomplete="name"
          class="w-full rounded-lg border border-slate-700 bg-slate-900 px-3 py-2 text-sm text-slate-100 placeholder:text-slate-500 outline-none focus:ring-1 focus:ring-indigo-500 focus:border-indigo-500"
        />
      </div>

      <div class="space-y-1">
        <label class="block text-sm text-slate-300">Username</label>
        <input
          type="text"
          name="username"
          [(ngModel)]="form.username"
          autocomplete="username"
          class="w-full rounded-lg border border-slate-700 bg-slate-900 px-3 py-2 text-sm text-slate-100 placeholder:text-slate-500 outline-none focus:ring-1 focus:ring-indigo-500 focus:border-indigo-500"
        />
      </div>

      <div class="space-y-1">
        <label class="block text-sm text-slate-300">Email</label>
        <input
          type="email"
          name="email"
          [(ngModel)]="form.email"
          required
          autocomplete="email"
          class="w-full rounded-lg border border-slate-700 bg-slate-900 px-3 py-2 text-sm text-slate-100 placeholder:text-slate-500 outline-none focus:ring-1 focus:ring-indigo-500 focus:border-indigo-500"
        />
      </div>

      <div class="space-y-1">
        <label class="block text-sm text-slate-300">Phone</label>
        <input
          type="tel"
          name="phone"
          [(ngModel)]="form.phone"
          autocomplete="tel"
          class="w-full rounded-lg border border-slate-700 bg-slate-900 px-3 py-2 text-sm text-slate-100 placeholder:text-slate-500 outline-none focus:ring-1 focus:ring-indigo-500 focus:border-indigo-500"
        />
      </div>

      <div class="space-y-1">
        <label class="block text-sm text-slate-300">Password</label>
        <input
          type="password"
          name="password"
          [(ngModel)]="form.password"
          required
          autocomplete="new-password"
          class="w-full rounded-lg border border-slate-700 bg-slate-900 px-3 py-2 text-sm text-slate-100 placeholder:text-slate-500 outline-none focus:ring-1 focus:ring-indigo-500 focus:border-indigo-500"
        />
      </div>

      <p *ngIf="error()" class="text-sm text-rose-400">
        {{ error() }}
      </p>

      <button
        type="submit"
        class="w-full mt-2 inline-flex items-center justify-center rounded-xl bg-linear-to-r from-indigo-600 to-cyan-500 px-4 py-2.5 text-sm font-semibold text-white shadow-lg shadow-indigo-950/40 hover:brightness-110 active:translate-y-px transition disabled:opacity-60 disabled:cursor-not-allowed"
        [disabled]="loading()"
      >
        {{ loading() ? 'Please wait…' : 'Sign up' }}
      </button>
    </form>
  </div>
</div>
