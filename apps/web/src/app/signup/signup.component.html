<section class="relative isolate flex min-h-[calc(100vh-10rem)] items-center overflow-hidden rounded-[2.25rem] border border-slate-200/70 bg-white px-5 py-10 shadow-[0_32px_90px_-52px_rgba(15,23,42,0.55)] sm:px-8 lg:px-12">
  <div class="pointer-events-none absolute -left-24 -top-20 h-64 w-64 rounded-full bg-[#0f2f7f]/8 blur-3xl"></div>
  <div class="pointer-events-none absolute -bottom-24 -right-16 h-64 w-64 rounded-full bg-cyan-200/40 blur-3xl"></div>

  <div class="relative z-10 mx-auto grid max-w-5xl gap-8 lg:grid-cols-[1.05fr_minmax(0,1fr)] lg:items-center">
    <div class="order-2 lg:order-1">
      <p class="text-[11px] font-black uppercase tracking-[0.18em] text-[#0f2f7f]">New Account</p>
      <h1 class="mt-3 font-headline text-4xl font-black tracking-[-0.02em] text-slate-900 sm:text-5xl">Create Profile</h1>
      <p class="mt-4 max-w-md text-sm leading-relaxed text-slate-600 sm:text-base">
        Join Atheneum to track orders, save favorites, and move through checkout faster.
      </p>

      <div class="mt-6 hidden gap-3 sm:flex">
        <span class="inline-flex items-center gap-1 rounded-full border border-slate-200 bg-slate-50 px-3 py-1 text-[11px] font-bold uppercase tracking-[0.12em] text-slate-600">
          <span class="material-symbols-outlined text-[15px] text-[#0f2f7f]">bolt</span>
          Faster Checkout
        </span>
        <span class="inline-flex items-center gap-1 rounded-full border border-slate-200 bg-slate-50 px-3 py-1 text-[11px] font-bold uppercase tracking-[0.12em] text-slate-600">
          <span class="material-symbols-outlined text-[15px] text-[#0f2f7f]">inventory_2</span>
          Order Tracking
        </span>
      </div>
    </div>

    <div class="order-1 rounded-3xl border border-slate-200 bg-white p-5 shadow-[0_18px_48px_-36px_rgba(15,23,42,0.85)] sm:p-7 lg:order-2">
      <p class="text-sm text-slate-500">
        Already have an account?
        <a routerLink="/signin" class="font-bold text-[#0f2f7f] transition hover:text-[#0a1f52]">Sign in</a>
      </p>

      <form (ngSubmit)="submit()" class="mt-5 space-y-4">
        <div class="grid gap-4 sm:grid-cols-2">
          <div class="space-y-1.5 sm:col-span-2">
            <label class="block text-xs font-bold uppercase tracking-[0.14em] text-slate-500">Name</label>
            <input
              type="text"
              name="name"
              [(ngModel)]="form.name"
              required
              autocomplete="name"
              class="h-11 w-full rounded-xl border border-slate-200 bg-white px-3 text-sm text-slate-900 placeholder-slate-400 outline-none transition focus:border-[#0f2f7f] focus:ring-2 focus:ring-[#0f2f7f]/10"
            />
          </div>

          <div class="space-y-1.5">
            <label class="block text-xs font-bold uppercase tracking-[0.14em] text-slate-500">Username</label>
            <input
              type="text"
              name="username"
              [(ngModel)]="form.username"
              autocomplete="username"
              class="h-11 w-full rounded-xl border border-slate-200 bg-white px-3 text-sm text-slate-900 placeholder-slate-400 outline-none transition focus:border-[#0f2f7f] focus:ring-2 focus:ring-[#0f2f7f]/10"
            />
          </div>

          <div class="space-y-1.5">
            <label class="block text-xs font-bold uppercase tracking-[0.14em] text-slate-500">Phone</label>
            <input
              type="tel"
              name="phone"
              [(ngModel)]="form.phone"
              autocomplete="tel"
              class="h-11 w-full rounded-xl border border-slate-200 bg-white px-3 text-sm text-slate-900 placeholder-slate-400 outline-none transition focus:border-[#0f2f7f] focus:ring-2 focus:ring-[#0f2f7f]/10"
            />
          </div>

          <div class="space-y-1.5 sm:col-span-2">
            <label class="block text-xs font-bold uppercase tracking-[0.14em] text-slate-500">Email</label>
            <input
              type="email"
              name="email"
              [(ngModel)]="form.email"
              required
              autocomplete="email"
              class="h-11 w-full rounded-xl border border-slate-200 bg-white px-3 text-sm text-slate-900 placeholder-slate-400 outline-none transition focus:border-[#0f2f7f] focus:ring-2 focus:ring-[#0f2f7f]/10"
            />
          </div>

          <div class="space-y-1.5 sm:col-span-2">
            <label class="block text-xs font-bold uppercase tracking-[0.14em] text-slate-500">Password</label>
            <input
              type="password"
              name="password"
              [(ngModel)]="form.password"
              required
              autocomplete="new-password"
              class="h-11 w-full rounded-xl border border-slate-200 bg-white px-3 text-sm text-slate-900 placeholder-slate-400 outline-none transition focus:border-[#0f2f7f] focus:ring-2 focus:ring-[#0f2f7f]/10"
            />
          </div>
        </div>

        <p *ngIf="error()" class="rounded-xl border border-rose-200 bg-rose-50 px-3 py-2 text-sm font-semibold text-rose-700">
          {{ error() }}
        </p>

        <button
          type="submit"
          class="inline-flex h-11 w-full items-center justify-center gap-2 rounded-xl bg-[#0f2f7f] px-4 text-sm font-bold uppercase tracking-widest text-white shadow-lg shadow-[#0f2f7f]/20 transition hover:bg-[#0a1f52] active:scale-[0.99] disabled:cursor-not-allowed disabled:opacity-60"
          [disabled]="loading()"
        >
          <span class="material-symbols-outlined text-[18px]">person_add</span>
          {{ loading() ? 'Please wait...' : 'Sign up' }}
        </button>
      </form>
    </div>
  </div>
</section>
