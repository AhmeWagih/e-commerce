<!-- Backdrop -->
<div
  class="fixed inset-0 z-50 flex items-center justify-center p-4"
  (click)="cancel()"
>
  <div class="absolute inset-0 bg-black/40 backdrop-blur-sm"></div>

  <!-- Modal -->
  <div
    class="relative z-10 w-full max-w-xl rounded-2xl bg-white shadow-2xl"
    (click)="$event.stopPropagation()"
  >
    <!-- Header -->
    <div class="flex items-center justify-between border-b border-slate-100 px-6 py-5">
      <div>
        <p class="text-xs font-bold uppercase tracking-[0.16em] text-[#0f2f7f]">New Artifact</p>
        <h2 class="mt-0.5 text-xl font-black tracking-tight text-slate-900">Add Product</h2>
      </div>
      <button
        (click)="cancel()"
        class="grid h-9 w-9 place-content-center rounded-full border border-slate-200 text-slate-400 transition hover:bg-slate-100 hover:text-slate-600"
      >
        <span class="material-symbols-outlined text-[20px]">close</span>
      </button>
    </div>

    <!-- Body -->
    <div class="max-h-[70vh] overflow-y-auto px-6 py-5">
      @if (error()) {
        <div class="mb-4 flex items-center gap-2 rounded-xl border border-red-100 bg-red-50 px-4 py-3 text-sm text-red-700">
          <span class="material-symbols-outlined text-[18px] shrink-0">error_outline</span>
          {{ error() }}
        </div>
      }

      <div class="grid grid-cols-1 gap-4 sm:grid-cols-2">
        <!-- Title -->
        <div class="sm:col-span-2">
          <label class="mb-1.5 block text-xs font-bold uppercase tracking-[0.12em] text-slate-500">
            Title <span class="text-red-500">*</span>
          </label>
          <input
            type="text"
            [(ngModel)]="form.title"
            placeholder="e.g. Handcrafted Ceramic Vase"
            class="h-10 w-full rounded-xl border border-slate-200 bg-slate-50 px-4 text-sm text-slate-900 placeholder-slate-400 outline-none transition focus:border-[#0f2f7f] focus:bg-white focus:ring-2 focus:ring-[#0f2f7f]/10"
          />
        </div>

        <!-- Brand -->
        <div>
          <label class="mb-1.5 block text-xs font-bold uppercase tracking-[0.12em] text-slate-500">
            Brand <span class="text-red-500">*</span>
          </label>
          <input
            type="text"
            [(ngModel)]="form.brand"
            placeholder="e.g. Atelier Rome"
            class="h-10 w-full rounded-xl border border-slate-200 bg-slate-50 px-4 text-sm text-slate-900 placeholder-slate-400 outline-none transition focus:border-[#0f2f7f] focus:bg-white focus:ring-2 focus:ring-[#0f2f7f]/10"
          />
        </div>

        <!-- Quantity -->
        <div>
          <label class="mb-1.5 block text-xs font-bold uppercase tracking-[0.12em] text-slate-500">
            Quantity <span class="text-red-500">*</span>
          </label>
          <input
            type="number"
            [(ngModel)]="form.quantity"
            min="0"
            placeholder="0"
            class="h-10 w-full rounded-xl border border-slate-200 bg-slate-50 px-4 text-sm text-slate-900 placeholder-slate-400 outline-none transition focus:border-[#0f2f7f] focus:bg-white focus:ring-2 focus:ring-[#0f2f7f]/10"
          />
        </div>

        <!-- Price -->
        <div>
          <label class="mb-1.5 block text-xs font-bold uppercase tracking-[0.12em] text-slate-500">
            Price <span class="text-red-500">*</span>
          </label>
          <input
            type="number"
            [(ngModel)]="form.price"
            min="0"
            step="0.01"
            placeholder="0.00"
            class="h-10 w-full rounded-xl border border-slate-200 bg-slate-50 px-4 text-sm text-slate-900 placeholder-slate-400 outline-none transition focus:border-[#0f2f7f] focus:bg-white focus:ring-2 focus:ring-[#0f2f7f]/10"
          />
        </div>

        <!-- Currency -->
        <div>
          <label class="mb-1.5 block text-xs font-bold uppercase tracking-[0.12em] text-slate-500">
            Currency <span class="text-red-500">*</span>
          </label>
          <select
            [(ngModel)]="form.currency"
            class="h-10 w-full rounded-xl border border-slate-200 bg-slate-50 px-4 text-sm text-slate-900 outline-none transition focus:border-[#0f2f7f] focus:bg-white focus:ring-2 focus:ring-[#0f2f7f]/10"
          >
            @for (c of currencies; track c) {
              <option [value]="c">{{ c }}</option>
            }
          </select>
        </div>

        <!-- Discount -->
        <div class="sm:col-span-2">
          <label class="mb-1.5 block text-xs font-bold uppercase tracking-[0.12em] text-slate-500">
            Discount (%)
          </label>
          <input
            type="number"
            [(ngModel)]="form.discount"
            min="0"
            max="100"
            placeholder="0"
            class="h-10 w-full rounded-xl border border-slate-200 bg-slate-50 px-4 text-sm text-slate-900 placeholder-slate-400 outline-none transition focus:border-[#0f2f7f] focus:bg-white focus:ring-2 focus:ring-[#0f2f7f]/10"
          />
        </div>

        <!-- Description -->
        <div class="sm:col-span-2">
          <label class="mb-1.5 block text-xs font-bold uppercase tracking-[0.12em] text-slate-500">
            Description
          </label>
          <textarea
            [(ngModel)]="form.description"
            rows="3"
            placeholder="Describe the product..."
            class="w-full resize-none rounded-xl border border-slate-200 bg-slate-50 px-4 py-3 text-sm text-slate-900 placeholder-slate-400 outline-none transition focus:border-[#0f2f7f] focus:bg-white focus:ring-2 focus:ring-[#0f2f7f]/10"
          ></textarea>
        </div>

        <!-- Specifications -->
        <div class="sm:col-span-2">
          <label class="mb-1.5 block text-xs font-bold uppercase tracking-[0.12em] text-slate-500">
            Specifications
          </label>
          <textarea
            [(ngModel)]="form.specifications"
            rows="3"
            placeholder="Materials, dimensions, origin..."
            class="w-full resize-none rounded-xl border border-slate-200 bg-slate-50 px-4 py-3 text-sm text-slate-900 placeholder-slate-400 outline-none transition focus:border-[#0f2f7f] focus:bg-white focus:ring-2 focus:ring-[#0f2f7f]/10"
          ></textarea>
        </div>
      </div>
    </div>

    <!-- Footer -->
    <div class="flex items-center justify-end gap-3 border-t border-slate-100 px-6 py-4">
      <button
        (click)="cancel()"
        type="button"
        class="rounded-xl border border-slate-200 px-5 py-2.5 text-sm font-bold text-slate-600 transition hover:bg-slate-50"
      >
        Cancel
      </button>
      <button
        (click)="submit()"
        [disabled]="loading()"
        type="button"
        class="inline-flex items-center gap-2 rounded-xl bg-[#0f2f7f] px-6 py-2.5 text-sm font-bold uppercase tracking-[0.1em] text-white shadow-lg transition hover:bg-[#0a1f52] active:scale-95 disabled:cursor-not-allowed disabled:opacity-60"
      >
        @if (loading()) {
          <span class="material-symbols-outlined animate-spin text-[18px]">progress_activity</span>
          Saving...
        } @else {
          <span class="material-symbols-outlined text-[18px]">add</span>
          Add Product
        }
      </button>
    </div>
  </div>
</div>
